<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Vigil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0E14;
    --surface: #12161F;
    --border: #232838;
    --text: #E4E7EC;
    --text-muted: #7C8496;
    --text-dim: #4B5165;
    --calm: #4A9B8E;
    --calm-glow: rgba(74, 155, 142, 0.35);
    --alert: #E0575B;
    --amber: #D9A441;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 36px;
    max-width: 460px;
    width: 100%;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .eye-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--calm);
    box-shadow: 0 0 0 4px var(--calm-glow);
    flex-shrink: 0;
  }

  .sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 12px 14px;
    border-radius: 4px;
    margin-bottom: 18px;
  }

  input[type="text"]:focus { outline: none; border-color: var(--calm); }
  input::placeholder { color: var(--text-dim); }

  button {
    width: 100%;
    background: var(--calm);
    color: var(--bg);
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 13px;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .result {
    margin-top: 22px;
    padding: 18px;
    border-radius: 6px;
    display: none;
  }

  .result.show { display: block; }

  .result.ok {
    background: rgba(74, 155, 142, 0.08);
    border: 1px solid rgba(74, 155, 142, 0.3);
  }

  .result.err {
    background: rgba(224, 87, 91, 0.08);
    border: 1px solid rgba(224, 87, 91, 0.3);
    color: var(--alert);
    font-size: 13px;
    padding: 14px;
  }

  .result-label {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 10px;
  }

  .key-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 13px;
    word-break: break-all;
    color: var(--calm);
    margin-bottom: 14px;
  }

  .warning {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .go-btn {
    background: var(--surface);
    border: 1px solid var(--calm);
    color: var(--calm);
    text-decoration: none;
    display: block;
    text-align: center;
    padding: 11px;
    border-radius: 4px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13px;
  }

  .go-btn:hover { background: rgba(74, 155, 142, 0.1); }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
  }

  .back-link:hover { color: var(--text-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Agent Behavior Monitor</div>
  <h1><span class="eye-dot"></span>Sign up for Vigil</h1>
  <div class="sub">Get your own isolated space — your agents' activity stays completely separate from the public demo and every other organization.</div>

  <label for="orgName">Organization name</label>
  <input type="text" id="orgName" placeholder="e.g. Riverside Logistics">
  <button id="signupBtn">Create my organization</button>

  <div class="result" id="result"></div>

  <a href="index.html" class="back-link">← Back to the public demo</a>
</div>

<script>
  const API_BASE = window.location.origin;

  document.getElementById('signupBtn').addEventListener('click', async () => {
    const name = document.getElementById('orgName').value.trim();
    const btn = document.getElementById('signupBtn');
    const result = document.getElementById('result');

    if (!name) {
      result.className = 'result show err';
      result.textContent = 'Enter an organization name first.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating...';
    result.className = 'result show err';
    result.textContent = 'Setting things up — if the server is asleep this can take ~30s.';

    try {
      const res = await fetch(`${API_BASE}/api/organizations`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });

      if (res.status === 409) {
        result.className = 'result show err';
        result.textContent = 'An organization with this name already exists. Try a different name.';
        return;
      }
      if (!res.ok) throw new Error('Bad response');

      const org = await res.json();

      result.className = 'result show ok';
      result.innerHTML = `
        <div class="result-label">Your API key — shown only once</div>
        <div class="key-box">${org.apiKey}</div>
        <div class="warning">Copy this now and store it somewhere safe. There is no way to recover it later — if you lose it, you would need to create a new organization.</div>
        <a class="go-btn" href="index.html?apiKey=${encodeURIComponent(org.apiKey)}">Go to my dashboard →</a>
      `;
    } catch (err) {
      result.className = 'result show err';
      result.textContent = 'Could not reach Vigil — the server may still be waking up. Try again in a moment.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create my organization';
    }
  });
</script>
</body>
</html>
